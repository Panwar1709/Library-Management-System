services:
  mysql:
    image: mysql:8.0
    container_name: library-mysql
    environment:
      MYSQL_ROOT_PASSWORD: libraryroot
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-plibraryroot"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
